<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Meskie's Ethiopian Restaurant</title>
        <link rel="stylesheet" type="text/css" href="assets/css/style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inika:400,700">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Alata">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Barlow:700,400">
    </head>
   
    <header>
        <div class="navbar-tabs">
            <a href="home">
                <img src="assets/img/MeskiesEthiopianRestaurant.png" id="logo">
            </a>
            <nav>
                <ul>
                    <li><a href="hours-and-location">HOURS & LOCATION</a></li>
                    <li><a href="menu.html" target="_blank">MENU</a></li>
                    <li><a href="catering">CATERING</a></li>
                    <li><a href="deals">DEALS</a></li>
                    <li><a href="order" id="order-button">ORDER</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
   
    <body>
        <section id="landing">
            <div class="big-box1">
                <img class="photo" src="assets/img/img1.png">
                <img class="photo" src="assets/img/img2.png">
                <img class="photo" src="assets/img/img3.png">
            </div>
            <div class="big-box1">
                <div class="text">Ethiopian  Restaurant</div> 
            </div>
            <div class="big-box1">
                <img class="photo" src="assets/img/img4.png">
                <img class="photo" src="assets/img/img5.png">
                <img class="photo" src="assets/img/img6.png">
            </div>
        </section>
        <section id="info">
            <div class="big-box2">
                <div class="caption1 caption1--authentic">AUTHENTIC</div>
                <div class="caption2">Original Ethiopian</div>
                <div class="caption25">Cuisine</div>
                <img class="caption" src="assets/img/authentic.png">
            </div>
            <div class="big-box2">
                <img class="caption" src="assets/img/delicious.png">
                <div class="caption1 caption1--delicious">DELICIOUS</div>
                <div class="caption2">Here for more than 15</div>
                <div class="caption25">years</div>
            </div>
        </section>
        <section id="dishes">
            <div class="big-box3">
                <div class="favcaption">FAVORITES</div>
            </div>
            <div class="big-box3">
                <div class="favimg">
                    <img class="favpic" src="assets/img/dish1.png">
                    <img class="favpic" src="assets/img/dish2.png">
                    <img class="favpic" src="assets/img/dish3.png">
                    <img class="favpic" src="assets/img/dish4.png">
                </div>
            </div>
        </section>
        <section id="part-menu">
            <div class="big-box4">
                <img class="homemenu" src="assets/img/homemenu.png">
                <div class="view-button"><a href="menu.html" target="_blank">VIEW MORE</a></div>
            </div>
        </section>
        <section id="order">
            <div class="big-box5">
                <img src="assets/img/orderonline.png">
            </div>
           <div class="big-box5">
                <div class="order-online">
                    <div class="online">ORDER ONLINE</div>
                    <div class="skip">Skip the wait and order for pick up</div>
                    <div><a href="order" id="order-button">ORDER</a></div>
                </div>
           </div> 
        </section>
        <section id="footer">
            <div class="big-box6">
                2955 Telegrpah Ave. Berkeley, CA 94704
            </div>
            <div class="big-box6">
                PHONE: (510)843 - 1992
            </div>
            <div class="big-box6">
                <div class="socials">
                        <img class="icon" src="assets/img/mail.png">
                        <img class="icon" src="assets/img/instagram.png">
                        <img class="icon" src="assets/img/facebook.png">
                </div>    
            </div>
        </section>
    </body>
</html>
